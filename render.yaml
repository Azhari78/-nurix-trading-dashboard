services:
  - type: web
    name: nurix-trading-dashboard
    env: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: WEB_CONCURRENCY
        value: "1"

      - key: EXCHANGE_NAME
        value: gateio
      - key: SYMBOLS
        value: BTC/USDT,ETH/USDT,SOL/USDT,BNB/USDT,XRP/USDT,ADA/USDT,DOGE/USDT,TRX/USDT,AVAX/USDT,LINK/USDT,DOT/USDT,POL/USDT,LTC/USDT,BCH/USDT,XLM/USDT,ATOM/USDT,XMR/USDT,ETC/USDT,UNI/USDT,FIL/USDT,HBAR/USDT,NEAR/USDT,ICP/USDT,VET/USDT,CRO/USDT,ALGO/USDT,SUI/USDT,INJ/USDT,APT/USDT,OP/USDT,ARB/USDT,RNDR/USDT,IMX/USDT,STX/USDT,MKR/USDT,AAVE/USDT,THETA/USDT,EOS/USDT,EGLD/USDT,MANA/USDT,SAND/USDT,FTM/USDT,TIA/USDT,PEPE/USDT,SHIB/USDT,BONK/USDT,GRT/USDT,LDO/USDT,FLOW/USDT,SEI/USDT
      - key: DEFAULT_TIMEFRAME
        value: 1m

      - key: STREAM_SSL_VERIFY
        value: "true"
      - key: STREAM_SSL_CA_BUNDLE
        value: ""

      # Safe defaults for first deploy. Switch to live trading only after validation.
      - key: AUTO_TRADE_ENABLED
        value: "true"
      - key: PAPER_TRADING
        value: "true"
      - key: AUTO_TRADE_SYMBOLS
        value: BTC/USDT
      - key: AUTO_TRADE_STRATEGY_MODE
        value: both
      - key: AUTO_TRADE_ENABLE_SHORT
        value: "true"
      - key: AUTO_TRADE_MAX_OPEN_POSITIONS
        value: "2"
      - key: AUTO_TRADE_SYMBOL_VALIDATION_ENABLED
        value: "true"
      - key: TRADE_SIZE_USDT
        value: "9"
      - key: TRADE_SIZE_USDT_MIN
        value: "8"
      - key: TRADE_SIZE_USDT_MAX
        value: "10"
      - key: TRADE_SIZE_PERCENT
        value: "0"
      - key: AUTO_TRADE_VOLATILITY_SIZING_ENABLED
        value: "true"
      - key: AUTO_TRADE_TARGET_ATR_PCT
        value: "0.9"
      - key: AUTO_TRADE_VOLATILITY_SIZE_MIN_MULT
        value: "0.55"
      - key: AUTO_TRADE_VOLATILITY_SIZE_MAX_MULT
        value: "1.65"
      - key: AUTO_TRADE_MIN_NOTIONAL_USDT
        value: "3.5"
      - key: AUTO_TRADE_MIN_BUFFER_PCT
        value: "1.5"
      - key: AUTO_TRADE_ENTRY_CONFIRM_EMA_STACK
        value: "true"
      - key: AUTO_TRADE_ENTRY_CONFIRM_MACD
        value: "true"
      - key: AUTO_TRADE_MIN_VOLUME_RATIO
        value: "0.8"
      - key: AUTO_TRADE_MIN_STRENGTH_CONFIDENCE
        value: "25"
      - key: AUTO_TRADE_SESSION_FILTER_ENABLED
        value: "false"
      - key: AUTO_TRADE_SESSION_UTC
        value: "0-23"
      - key: AUTO_TRADE_EXTREME_VOLATILITY_BLOCK_ENABLED
        value: "true"
      - key: AUTO_TRADE_MAX_ATR_PCT
        value: "5.5"
      - key: AUTO_TRADE_MAX_ABS_CHANGE_24H_PCT
        value: "20"
      - key: STOP_LOSS_PCT
        value: "5.0"
      - key: TAKE_PROFIT_PCT
        value: "10.0"
      - key: LONG_RSI_MIN
        value: "45"
      - key: LONG_RSI_MAX
        value: "60"
      - key: LONG_STOP_LOSS_PCT
        value: "5.0"
      - key: LONG_TAKE_PROFIT_PCT
        value: "10.0"
      - key: LONG_TRAILING_PCT
        value: "5.0"
      - key: SHORT_RSI_MIN
        value: "60"
      - key: SHORT_RSI_MAX
        value: "75"
      - key: SHORT_STOP_LOSS_PCT
        value: "4.0"
      - key: SHORT_TAKE_PROFIT_PCT
        value: "7.0"
      - key: SHORT_TRAILING_PCT
        value: "4.0"
      - key: AUTO_TRADE_PARTIAL_TP_ENABLED
        value: "true"
      - key: AUTO_TRADE_PARTIAL_TP_PCT
        value: "3.0"
      - key: AUTO_TRADE_PARTIAL_TP_RATIO
        value: "0.5"
      - key: AUTO_TRADE_BREAK_EVEN_ENABLED
        value: "true"
      - key: AUTO_TRADE_BREAK_EVEN_TRIGGER_PCT
        value: "1.25"
      - key: AUTO_TRADE_BREAK_EVEN_BUFFER_PCT
        value: "0.1"
      - key: COOLDOWN_SECONDS
        value: "600"
      - key: COOLDOWN_MIN_SECONDS
        value: "600"
      - key: COOLDOWN_MAX_SECONDS
        value: "900"
      - key: AUTO_TRADE_COOLDOWN_ADAPTIVE_ENABLED
        value: "true"
      - key: AUTO_TRADE_COOLDOWN_LOSS_STEP_MULT
        value: "0.35"
      - key: AUTO_TRADE_COOLDOWN_VOL_TARGET_ATR_PCT
        value: "0.9"
      - key: AUTO_TRADE_COOLDOWN_VOL_MAX_MULT
        value: "3.0"
      - key: AUTO_TRADE_MAX_CONSECUTIVE_LOSSES
        value: "3"
      - key: AUTO_TRADE_KILL_SWITCH_PAUSE_SECONDS
        value: "1800"
      - key: MAX_DAILY_LOSS_USDT
        value: "20"
      - key: AUTO_TRADE_MIN_CONFIDENCE
        value: "55"
      - key: AUTO_TRADE_FORWARD_GUARDRAIL_ENABLED
        value: "true"
      - key: AUTO_TRADE_FORWARD_GUARDRAIL_MIN_TRADES
        value: "14"
      - key: AUTO_TRADE_FORWARD_BASELINE_WIN_RATE
        value: "0.5"
      - key: AUTO_TRADE_FORWARD_BASELINE_AVG_PNL_USDT
        value: "0"
      - key: AUTO_TRADE_FORWARD_GUARDRAIL_RISK_MULT
        value: "0.6"
      - key: AUTO_TRADE_FORWARD_GUARDRAIL_SEVERE_WIN_RATE
        value: "0.35"
      - key: AUTO_TRADE_FORWARD_GUARDRAIL_HALT_ENABLED
        value: "false"
      - key: AI_FILTER_ENABLED
        value: "true"
      - key: AI_FILTER_MIN_CONFIDENCE
        value: "55"
      - key: AI_FILTER_MIN_SCORE_ABS
        value: "1.0"
      - key: USE_SANDBOX
        value: "false"
      - key: TELEGRAM_ENABLED
        value: "false"
      - key: TELEGRAM_AUTO_TRADE_ONLY
        value: "true"

      # Set these in Render Dashboard for production.
      - key: API_KEY
        sync: false
      - key: API_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
